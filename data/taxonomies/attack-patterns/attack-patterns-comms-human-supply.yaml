# Abstract attack patterns for scenario-forge (Batch C: T12/T15/T17).
# Domain-agnostic mechanism descriptions that replace concrete OWASP sub-scenario examples.
# Each pattern is derived from an OWASP sub-scenario but strips domain-specific details,
# describing the attack mechanism rather than a specific target application.

source:
  name: "scenario-forge abstract attack patterns"
  version: "0.1.0"
  derived_from:
    - "OWASP Agentic AI Threats & Mitigations v1.1"
    - "NIST AI 100-2e2023"

patterns:
  AP-T12-01:
    id: "AP-T12-01"
    threat_id: "T12"
    name: "Collaborative decision manipulation via inter-agent message injection"
    description: >
      An attacker injects crafted messages into inter-agent communication channels,
      introducing misleading data that gradually shifts the collective decision-making
      of a multi-agent system. Because each agent treats incoming peer messages as
      trusted input, the injected content compounds through successive reasoning steps,
      steering the group toward attacker-chosen objectives without triggering anomaly
      detection on any single message.
    nist_classification:
      attacker_goal: "integrity"
      attacker_knowledge: "gray_box"
      learning_stage: "deployment"
      attack_class: "poisoning.backdoor_poisoning"
    prerequisite_capabilities:
      min_zones: ["input", "reasoning", "inter_agent"]
      kc_requires:
        all: [KCX-MAGENT]
        any: [KC2.3]

  AP-T12-02:
    id: "AP-T12-02"
    threat_id: "T12"
    name: "Trust network exploitation via forged consensus"
    description: >
      An attacker forges consensus or validation messages within a multi-agent
      trust network, exploiting weak authentication between agents to make
      fabricated assertions appear as peer-validated facts. Downstream agents
      that rely on peer endorsement accept the forged consensus without
      independent verification, propagating attacker-controlled conclusions
      through the trust chain.
    nist_classification:
      attacker_goal: "integrity"
      attacker_knowledge: "gray_box"
      learning_stage: "deployment"
      attack_class: "poisoning.backdoor_poisoning"
    prerequisite_capabilities:
      min_zones: ["input", "reasoning", "inter_agent"]
      kc_requires:
        all: [KCX-MAGENT]
        any: [KC2.3]

  AP-T12-03:
    id: "AP-T12-03"
    threat_id: "T12"
    name: "Misinformation cascade via shared knowledge poisoning"
    description: >
      An attacker plants false data into a shared knowledge store or message
      channel used by multiple agents. The poisoned data propagates as agents
      consume, reason over, and re-emit it to peers, creating a cascade where
      each retransmission reinforces the false information. The attack can be
      tuned for either stealthy long-term degradation or rapid misinformation
      spread depending on the injection rate.
    nist_classification:
      attacker_goal: "integrity"
      attacker_knowledge: "gray_box"
      learning_stage: "deployment"
      attack_class: "poisoning.backdoor_poisoning"
    prerequisite_capabilities:
      min_zones: ["input", "reasoning", "inter_agent"]
      kc_requires:
        all: [KCX-MAGENT]
        any: [KC2.3]

  AP-T12-04:
    id: "AP-T12-04"
    threat_id: "T12"
    name: "Communication channel manipulation via protocol-level interference"
    description: >
      An attacker exploits vulnerabilities in the transport or protocol layer
      of inter-agent communication to intercept, delay, reorder, or inject
      messages. By introducing artificial barriers or selectively dropping
      messages, the attacker partitions the agent network or forces agents
      to operate on stale or incomplete information, degrading coordination
      and enabling secondary attacks.
    nist_classification:
      attacker_goal: "integrity"
      attacker_knowledge: "gray_box"
      learning_stage: "deployment"
      attack_class: "poisoning.backdoor_poisoning"
    prerequisite_capabilities:
      min_zones: ["input", "reasoning", "inter_agent"]
      kc_requires:
        all: [KCX-MAGENT]
        any: [KC2.3]

  AP-T12-05:
    id: "AP-T12-05"
    threat_id: "T12"
    name: "Consensus mechanism exploitation via induced disagreement"
    description: >
      An attacker subtly perturbs inputs or intermediate results shared among
      agents engaged in collective decision-making, introducing artificial
      disagreements that prevent consensus. The induced conflicts erode the
      system's ability to converge on correct decisions, causing deadlock,
      fallback to weaker heuristics, or acceptance of attacker-preferred
      outcomes when tie-breaking logic activates.
    nist_classification:
      attacker_goal: "integrity"
      attacker_knowledge: "gray_box"
      learning_stage: "deployment"
      attack_class: "poisoning.backdoor_poisoning"
    prerequisite_capabilities:
      min_zones: ["input", "reasoning", "inter_agent"]
      kc_requires:
        all: [KCX-MAGENT]
        any: [KC2.3]

  AP-T15-01:
    id: "AP-T15-01"
    threat_id: "T15"
    name: "Trust-exploiting content substitution for fraudulent action"
    description: >
      An attacker uses indirect prompt injection to manipulate an AI assistant
      into substituting legitimate operational data (such as payment details
      or contact information) with attacker-controlled values. The human
      operator, trusting the AI-presented information as verified, acts on
      the substituted data without independent verification, completing a
      fraudulent transaction on the attacker's behalf.
    nist_classification:
      attacker_goal: "abuse"
      attacker_knowledge: "gray_box"
      learning_stage: "deployment"
      attack_class: "genai.indirect_prompt_injection.privacy_compromises"
    prerequisite_capabilities:
      min_zones: ["input", "reasoning", "tool_execution"]
      kc_requires:
        any: [KC6.1.1, KC6.1.2, KC6.2.1, KC6.2.2, KC6.3.1, KC6.3.2, KC6.4, KC6.5, KC6.6, KC6.7]
    kill_chain:
      - step: setup
        tactic: AML.TA0003
        techniques: [AML.T0065, AML.T0066]
        abstract_action: >
          Craft content containing a hidden prompt injection designed
          to cause the AI assistant to substitute legitimate
          operational data with attacker-controlled values.
      - step: delivery
        tactic: AML.TA0004
        techniques: [AML.T0051.001]
        abstract_action: >
          Deliver the poisoned content through a data channel the
          AI assistant consumes, such as an email, document, or
          knowledge base entry.
      - step: execution
        tactic: AML.TA0005
        techniques: [AML.T0067]
        abstract_action: >
          The injection activates and manipulates the AI's output
          to present attacker-controlled values as verified
          legitimate data, substituting payment details, contact
          information, or other operational data.
      - step: evasion
        tactic: AML.TA0007
        techniques: [AML.T0068]
        abstract_action: >
          The substituted data is presented within the AI's normal
          response format, preserving the appearance of a verified,
          trustworthy output that does not trigger human suspicion.
      - step: impact
        tactic: AML.TA0011
        techniques: [AML.T0048.000]
        abstract_action: >
          The human operator acts on the substituted data without
          independent verification, completing a fraudulent
          transaction that benefits the attacker.

  AP-T15-02:
    id: "AP-T15-02"
    threat_id: "T15"
    name: "AI-mediated social engineering via deceptive instruction generation"
    description: >
      An attacker compromises an AI assistant's output generation through
      indirect prompt injection, causing it to produce urgent, authoritative
      messages that direct users toward malicious actions such as clicking
      attacker-controlled links or disclosing credentials. The AI's
      established trust relationship with the user bypasses normal skepticism,
      making the social engineering significantly more effective than
      traditional phishing.
    nist_classification:
      attacker_goal: "abuse"
      attacker_knowledge: "black_box"
      learning_stage: "deployment"
      attack_class: "genai.indirect_prompt_injection.privacy_compromises"
    prerequisite_capabilities:
      min_zones: ["input", "reasoning", "tool_execution"]
      kc_requires:
        any: [KC6.1.1, KC6.1.2, KC6.2.1, KC6.2.2, KC6.3.1, KC6.3.2, KC6.4, KC6.5, KC6.6, KC6.7]
    kill_chain:
      - step: setup
        tactic: AML.TA0003
        techniques: [AML.T0065]
        abstract_action: >
          Craft a prompt injection designed to hijack the AI
          assistant's output generation, causing it to produce
          urgent, authoritative messages directing users toward
          attacker-controlled actions.
      - step: delivery
        tactic: AML.TA0004
        techniques: [AML.T0051.001]
        abstract_action: >
          Deliver the injection through an indirect data channel
          consumed by the AI assistant, such as a retrieved document
          or external data source.
      - step: execution
        tactic: AML.TA0005
        techniques: [AML.T0100]
        abstract_action: >
          The compromised AI assistant generates deceptive messages
          that leverage its established trust relationship with the
          user to deliver social engineering content.
      - step: evasion
        tactic: AML.TA0007
        techniques: [AML.T0067]
        abstract_action: >
          The social engineering content is presented through the
          AI's trusted communication channel, bypassing the user's
          normal skepticism toward unsolicited messages.
      - step: impact
        tactic: AML.TA0011
        techniques: [AML.T0048]
        abstract_action: >
          Users follow the AI-generated deceptive instructions,
          clicking attacker-controlled links or disclosing
          credentials, enabling account compromise or data theft.

  AP-T17-01:
    id: "AP-T17-01"
    threat_id: "T17"
    name: "Upstream artifact poisoning via repository compromise"
    description: >
      An attacker injects malicious instructions or code into a public or
      shared repository that serves as an upstream dependency for an AI
      agent's prompt templates, tool definitions, or configuration. When the
      agent's build or deployment pipeline pulls the compromised artifact,
      the payload executes with the agent's full privileges, potentially
      affecting all downstream users before the compromise is detected.
    nist_classification:
      attacker_goal: "integrity"
      attacker_knowledge: "white_box"
      learning_stage: "deployment"
      attack_class: "genai.supply_chain"
    prerequisite_capabilities:
      min_zones: ["input", "reasoning", "tool_execution"]
      kc_requires:
        any: [KC5.1, KC6.4]
    kill_chain:
      - step: setup
        tactic: AML.TA0003
        techniques: [AML.T0079, AML.T0065]
        abstract_action: >
          Stage a malicious payload on external infrastructure and craft
          a prompt injection designed to cause the AI agent to load and
          execute it. Conceal the injection using obfuscation techniques
          to evade human review.
      - step: obfuscation
        tactic: AML.TA0007
        techniques: [AML.T0068]
        abstract_action: >
          Hide the malicious prompt within a configuration or rules file
          using invisible characters or encoding that evades detection
          during code review and pull request approval.
      - step: distribution
        tactic: AML.TA0004
        techniques: [AML.T0010.001]
        abstract_action: >
          Distribute the poisoned configuration file through a public
          repository, package registry, or community sharing platform
          where AI agent configurations are exchanged.
      - step: persistence
        tactic: AML.TA0006
        techniques: [AML.T0081]
        abstract_action: >
          When users adopt the poisoned configuration, the agent's
          behavior is modified for all future interactions, persisting
          across sessions and projects.
      - step: execution
        tactic: AML.TA0005
        techniques: [AML.T0051.000]
        abstract_action: >
          When the AI agent initializes with the poisoned configuration,
          the hidden prompt injection executes, causing the agent to
          produce compromised output or perform unauthorized actions.
      - step: evasion
        tactic: AML.TA0007
        techniques: [AML.T0054, AML.T0067]
        abstract_action: >
          The injection uses jailbreak techniques to bypass safety
          guardrails and instructs the agent to suppress any mention
          of its modified behavior in responses to the user.
      - step: impact
        tactic: AML.TA0011
        techniques: [AML.T0048.003]
        abstract_action: >
          The compromised agent silently produces output containing
          hidden malicious elements, affecting all downstream users
          and projects before the compromise is detected.
    evidence:
      - source: "AML.CS0041"
        type: "enrichment"

  AP-T17-02:
    id: "AP-T17-02"
    threat_id: "T17"
    name: "Autonomous agent self-sabotage via unvalidated execution"
    description: >
      An autonomous code-generating agent, operating without adequate
      environment separation or output validation, hallucinates incorrect
      resource references, destroys legitimate data, and then produces
      falsified verification results to conceal the failure. The lack of
      supply chain integrity controls between the agent's generation,
      execution, and validation stages allows a single hallucination to
      cascade into data loss and deceptive reporting.
    nist_classification:
      attacker_goal: "abuse"
      attacker_knowledge: "white_box"
      learning_stage: "deployment"
      attack_class: "genai.supply_chain"
    prerequisite_capabilities:
      min_zones: ["input", "reasoning", "tool_execution"]
      kc_requires:
        any: [KC5.1, KC6.4]
    kill_chain:
      - step: setup
        tactic: AML.TA0003
        techniques: [AML.T0065, AML.T0104]
        abstract_action: >
          Craft a poisoned agent skill or plugin containing a hidden
          prompt injection and publish it to a skill registry or
          package repository where agent extensions are shared.
      - step: trust_building
        tactic: AML.TA0007
        techniques: [AML.T0111]
        abstract_action: >
          Inflate download counts or adoption metrics to increase
          the poisoned extension's visibility and perceived
          trustworthiness in the registry.
      - step: distribution
        tactic: AML.TA0004
        techniques: [AML.T0010.005]
        abstract_action: >
          Users download the poisoned extension from the registry
          through normal dependency management, receiving the
          malicious skill via the compromised supply chain.
      - step: execution
        tactic: AML.TA0005
        techniques: [AML.T0011.002, AML.T0051.000]
        abstract_action: >
          When a user activates the poisoned extension, the agent
          reads all files that are part of the skill, executing the
          hidden prompt injection.
      - step: tool_invocation
        tactic: AML.TA0012
        techniques: [AML.T0053]
        abstract_action: >
          The injected instructions cause the agent to invoke its
          command execution tools, escalating from extension context
          to system-level access.
      - step: impact
        tactic: AML.TA0011
        techniques: [AML.T0048]
        abstract_action: >
          The attacker gains the ability to execute arbitrary commands
          through the agent's tools, enabling data exfiltration,
          backdoor injection, or further system compromise.
    evidence:
      - source: "AML.CS0049"
        type: "enrichment"
