# Abstract attack patterns for scenario-forge.
# Domain-agnostic mechanism descriptions for T1 (Memory Poisoning), T2 (Tool Misuse),
# T3 (Privilege Compromise), and T4 (Resource Overload).
# Each pattern is derived from an OWASP sub-scenario but strips domain-specific details,
# describing the attack mechanism rather than a specific target application.

source:
  name: "scenario-forge abstract attack patterns"
  version: "0.1.0"
  derived_from:
    - "OWASP Agentic AI Threats & Mitigations v1.1"
    - "NIST AI 100-2e2023"

patterns:
  # ═══════════════════════════════════════════════════════════════════
  # T1 — Memory Poisoning (4 patterns)
  # ═══════════════════════════════════════════════════════════════════

  AP-T1-01:
    id: "AP-T1-01"
    threat_id: "T1"
    name: "Persistent memory rule injection"
    description: >
      An attacker repeatedly reinforces a false operational rule in the agent's
      persistent memory until the agent treats it as established fact. Once
      embedded, the fabricated rule overrides legitimate validation logic,
      causing the agent to authorize actions that violate its actual constraints.
    nist_classification:
      attacker_goal: "integrity"
      attacker_knowledge: "black_box"
      learning_stage: "deployment"
      attack_class: "poisoning.targeted_poisoning"
    prerequisite_capabilities:
      min_zones: ["input", "memory"]
      kc_requires:
        all: [KCX-PMEM]
        any: [KC4.3, KC4.4, KC4.5, KC4.6]
    kill_chain:
      - step: setup
        tactic: AML.TA0003
        techniques: [AML.T0065, AML.T0068]
        abstract_action: >
          Craft an adversarial prompt injection containing false operational
          rules and conceal it within content that the agent's connected
          application will ingest.
      - step: delivery
        tactic: AML.TA0004
        techniques: [AML.T0093]
        abstract_action: >
          Deliver the poisoned content through a connected application
          channel that the agent treats as a trusted data source.
      - step: execution
        tactic: AML.TA0005
        techniques: [AML.T0051.001]
        abstract_action: >
          When a user references the shared content, the agent ingests
          it into its context and the hidden prompt injection executes.
      - step: persistence
        tactic: AML.TA0006
        techniques: [AML.T0080.000]
        abstract_action: >
          The injection writes attacker-controlled false rules into the
          agent's persistent memory store, establishing cross-session
          persistence that overrides legitimate validation logic.
      - step: propagation
        tactic: AML.TA0006
        techniques: [AML.T0093]
        abstract_action: >
          The poisoned content remains in the shared channel, acting as
          a persistent infection vector that compromises additional
          users who access it.
      - step: impact
        tactic: AML.TA0011
        techniques: [AML.T0048.003]
        abstract_action: >
          The agent operates with corrupted memory, authorizing actions
          that violate its actual constraints based on attacker-controlled
          false rules persisted across sessions.
    evidence:
      - source: "AML.CS0040"
        type: "enrichment"

  AP-T1-02:
    id: "AP-T1-02"
    threat_id: "T1"
    name: "Context window saturation for privilege escalation"
    description: >
      An attacker fragments a privilege escalation attempt across multiple
      sessions, exploiting the agent's finite context window. Each fragment
      stays below detection thresholds individually, but cumulatively the agent
      loses track of prior authorization state and grants access it should deny.
    nist_classification:
      attacker_goal: "integrity"
      attacker_knowledge: "gray_box"
      learning_stage: "deployment"
      attack_class: "poisoning.targeted_poisoning"
    prerequisite_capabilities:
      min_zones: ["input", "memory"]
      kc_requires:
        any: [KC4.3, KC4.4, KC4.5, KC4.6]

  AP-T1-03:
    id: "AP-T1-03"
    threat_id: "T1"
    name: "Gradual threat-model erosion via memory drift"
    description: >
      An attacker incrementally alters the agent's stored threat definitions or
      classification criteria over successive interactions. The gradual drift
      causes the agent to progressively reclassify malicious activity as benign,
      creating a blind spot that permits undetected attacks.
    nist_classification:
      attacker_goal: "integrity"
      attacker_knowledge: "black_box"
      learning_stage: "deployment"
      attack_class: "poisoning.targeted_poisoning"
    prerequisite_capabilities:
      min_zones: ["input", "memory"]
      kc_requires:
        all: [KCX-PMEM]
        any: [KC4.3, KC4.4, KC4.5, KC4.6]

  AP-T1-04:
    id: "AP-T1-04"
    threat_id: "T1"
    name: "Shared memory corruption for cross-agent influence"
    description: >
      An attacker writes false operational data into a memory structure shared
      among multiple agents. Other agents that read from this shared store
      incorporate the corrupted data into their decision-making, propagating
      incorrect behavior across the system without direct interaction with each
      affected agent.
    nist_classification:
      attacker_goal: "integrity"
      attacker_knowledge: "black_box"
      learning_stage: "deployment"
      attack_class: "poisoning.targeted_poisoning"
    prerequisite_capabilities:
      min_zones: ["input", "memory", "inter_agent"]
      kc_requires:
        all: [KCX-SHMEM]
        any: [KC4.4, KC4.6]

  # ═══════════════════════════════════════════════════════════════════
  # T2 — Tool Misuse (6 patterns)
  # ═══════════════════════════════════════════════════════════════════

  AP-T2-01:
    id: "AP-T2-01"
    threat_id: "T2"
    name: "Parameter pollution via function-call manipulation"
    description: >
      An attacker crafts input that causes the agent to invoke a tool with
      inflated, malformed, or boundary-violating parameter values. The tool
      executes within its granted permissions but produces an outcome far
      outside intended operational bounds, such as amplified quantities or
      modified recipients.
    nist_classification:
      attacker_goal: "abuse"
      attacker_knowledge: "black_box"
      learning_stage: "deployment"
      attack_class: "genai.indirect_prompt_injection.abuse_violations"
    prerequisite_capabilities:
      min_zones: ["input", "tool_execution"]
      kc_requires:
        any: [KC6.1.1, KC6.1.2, KC6.2.1, KC6.2.2, KC6.3.1, KC6.3.2, KC6.4, KC6.5, KC6.6, KC6.7]
    kill_chain:
      - step: reconnaissance
        tactic: AML.TA0002
        techniques: [AML.T0084.001]
        abstract_action: >
          Study the agent's tool definitions and parameter schemas to
          identify validation gaps, boundary conditions, or parameters
          that accept open-ended values.
      - step: setup
        tactic: AML.TA0003
        techniques: [AML.T0065]
        abstract_action: >
          Craft input designed to cause the agent to populate tool
          parameters with inflated, malformed, or boundary-violating
          values while staying within the tool's granted permissions.
      - step: execution
        tactic: AML.TA0005
        techniques: [AML.T0051.000]
        abstract_action: >
          Submit the crafted input, causing the agent's reasoning to
          resolve attacker-influenced values into the tool call's
          parameter slots.
      - step: tool_invocation
        tactic: AML.TA0005
        techniques: [AML.T0053]
        abstract_action: >
          The agent invokes the tool with polluted parameters; the
          call passes permission checks because the tool itself is
          authorized, but the parameter values produce an outcome
          far outside intended operational bounds.
      - step: impact
        tactic: AML.TA0011
        techniques: [AML.T0048]
        abstract_action: >
          The tool executes with attacker-influenced parameters,
          producing amplified quantities, modified recipients, or
          other outcomes that violate the system's operational intent.

  AP-T2-02:
    id: "AP-T2-02"
    threat_id: "T2"
    name: "Multi-tool chain exploitation for data exfiltration"
    description: >
      An attacker manipulates the agent into chaining two or more authorized
      tools in a sequence the system designer did not anticipate. One tool
      retrieves sensitive data while a subsequent tool transmits it to an
      external destination. Each individual tool call appears legitimate,
      making the composite attack difficult to detect.
    nist_classification:
      attacker_goal: "abuse"
      attacker_knowledge: "black_box"
      learning_stage: "deployment"
      attack_class: "genai.indirect_prompt_injection.abuse_violations"
    prerequisite_capabilities:
      min_zones: ["input", "reasoning", "tool_execution"]
      kc_requires:
        any: [KC6.1.1, KC6.1.2, KC6.2.1, KC6.2.2, KC6.3.1, KC6.3.2, KC6.4, KC6.5, KC6.6, KC6.7]
    kill_chain:
      - step: reconnaissance
        tactic: AML.TA0002
        techniques: [AML.T0084.001, AML.T0084.003]
        abstract_action: >
          Discover the agent's available tools and their call chain
          relationships, identifying combinations where one tool
          retrieves sensitive data and another can transmit externally.
      - step: setup
        tactic: AML.TA0003
        techniques: [AML.T0065]
        abstract_action: >
          Craft a prompt that induces the agent to plan a multi-step
          tool sequence, framing the retrieval-then-exfiltration chain
          as a legitimate composite operation.
      - step: execution
        tactic: AML.TA0005
        techniques: [AML.T0051.000]
        abstract_action: >
          Submit the crafted prompt, causing the agent to reason
          through and commit to the multi-tool chain without
          recognizing the composite intent as malicious.
      - step: collection
        tactic: AML.TA0009
        techniques: [AML.T0085.001]
        abstract_action: >
          The first tool in the chain retrieves sensitive data from
          an authorized source, producing output that appears to be
          a normal intermediate result.
      - step: exfiltration
        tactic: AML.TA0010
        techniques: [AML.T0086]
        abstract_action: >
          A subsequent tool call transmits the retrieved data to an
          external destination, completing the exfiltration chain
          through individually legitimate tool invocations.
      - step: impact
        tactic: AML.TA0011
        techniques: [AML.T0048]
        abstract_action: >
          Sensitive data is exfiltrated through a composite tool
          chain where each individual call appears authorized,
          making the attack difficult to detect at the single-call
          level.

  AP-T2-03:
    id: "AP-T2-03"
    threat_id: "T2"
    name: "Automated mass-action abuse via tool amplification"
    description: >
      An attacker tricks the agent into using its document generation,
      distribution, or batch-processing tools to perform a high-volume
      malicious operation. The agent's automation capability amplifies a
      single deceptive input into a large-scale action such as mass
      distribution of crafted content.
    nist_classification:
      attacker_goal: "abuse"
      attacker_knowledge: "black_box"
      learning_stage: "deployment"
      attack_class: "genai.indirect_prompt_injection.abuse_violations"
    prerequisite_capabilities:
      min_zones: ["input", "tool_execution"]
      kc_requires:
        any: [KC6.1.1, KC6.1.2, KC6.2.1, KC6.2.2, KC6.3.1, KC6.3.2, KC6.4, KC6.5, KC6.6, KC6.7]
    kill_chain:
      - step: reconnaissance
        tactic: AML.TA0002
        techniques: [AML.T0084.001]
        abstract_action: >
          Identify the agent's batch-processing, mass-distribution,
          or document-generation capabilities and their parameter
          schemas.
      - step: setup
        tactic: AML.TA0003
        techniques: [AML.T0065]
        abstract_action: >
          Craft a deceptive prompt that frames a high-volume malicious
          operation as a legitimate batch task, embedding parameters
          that maximize the agent's amplification factor.
      - step: execution
        tactic: AML.TA0005
        techniques: [AML.T0051.000]
        abstract_action: >
          Submit the crafted input, causing the agent to accept the
          mass-action parameters and begin planning the batch
          operation without recognizing its malicious scale.
      - step: amplification
        tactic: AML.TA0005
        techniques: [AML.T0053]
        abstract_action: >
          The agent invokes its batch-processing tools, amplifying
          the single deceptive input into a high-volume operation
          such as mass distribution of crafted content or bulk
          data modification.
      - step: impact
        tactic: AML.TA0011
        techniques: [AML.T0048]
        abstract_action: >
          A single attacker input produces large-scale damage through
          the agent's automation capabilities, with impact
          disproportionate to the attacker's effort.

  AP-T2-04:
    id: "AP-T2-04"
    threat_id: "T2"
    name: "Tool misuse via poisoned persistent memory"
    description: >
      An attacker injects false directives into the agent's persistent memory
      in a prior session. In subsequent sessions the agent retrieves the
      poisoned memory and treats it as legitimate operational context, causing
      it to invoke tools with unauthorized parameters or targets while
      bypassing session-level security checks.
    nist_classification:
      attacker_goal: "abuse"
      attacker_knowledge: "black_box"
      learning_stage: "deployment"
      attack_class: "genai.indirect_prompt_injection.abuse_violations"
    prerequisite_capabilities:
      min_zones: ["input", "memory", "tool_execution"]
      kc_requires:
        all: [KCX-PMEM]
        any: [KC4.3, KC4.4, KC4.5, KC4.6]

  AP-T2-05:
    id: "AP-T2-05"
    threat_id: "T2"
    name: "Tool misuse via adversarial retrieval content"
    description: >
      An attacker inserts adversarially crafted content into a vector store
      that the agent queries for context. When the agent retrieves this
      poisoned content, it interprets the embedded directives as legitimate
      operational guidance, leading to unsafe or unauthorized tool invocations
      driven by the manipulated retrieval results.
    nist_classification:
      attacker_goal: "abuse"
      attacker_knowledge: "black_box"
      learning_stage: "deployment"
      attack_class: "genai.indirect_prompt_injection.abuse_violations"
    prerequisite_capabilities:
      min_zones: ["input", "memory", "tool_execution"]
      kc_requires:
        all: [KCX-VSTORE]
        any: [KC6.3.3]

  AP-T2-06:
    id: "AP-T2-06"
    threat_id: "T2"
    name: "Tool hijacking via prompt injection"
    description: >
      An attacker injects adversarial instructions into user input or an
      external data source consumed by the agent. The injected prompt
      overrides or supplements the agent's goal, causing it to invoke a
      tool — such as a shell, API client, or code interpreter — to execute
      a command chosen by the attacker.
    nist_classification:
      attacker_goal: "abuse"
      attacker_knowledge: "black_box"
      learning_stage: "deployment"
      attack_class: "genai.indirect_prompt_injection.abuse_violations"
    prerequisite_capabilities:
      min_zones: ["input", "reasoning", "tool_execution"]
      kc_requires:
        any: [KC6.1.1, KC6.1.2, KC6.2.1, KC6.2.2, KC6.3.1, KC6.3.2, KC6.4, KC6.5, KC6.6, KC6.7]
    kill_chain:
      - step: setup
        tactic: AML.TA0003
        techniques: [AML.T0065, AML.T0079]
        abstract_action: >
          Craft adversarial instructions designed to override the
          agent's operational goal and direct it to invoke a specific
          tool with attacker-chosen commands. Stage any required
          external payloads or receiving infrastructure.
      - step: delivery
        tactic: AML.TA0004
        techniques: [AML.T0093]
        abstract_action: >
          Inject the crafted prompt into the agent's input channel
          or embed it within an external data source the agent
          consumes, such as a document, web page, or API response.
      - step: execution
        tactic: AML.TA0005
        techniques: [AML.T0051]
        abstract_action: >
          The injected prompt activates within the agent's context,
          overriding or supplementing its original goal with the
          attacker's directive to invoke a tool.
      - step: tool_hijack
        tactic: AML.TA0005
        techniques: [AML.T0053, AML.T0102]
        abstract_action: >
          The agent invokes a tool — such as a shell, API client,
          or code interpreter — executing an attacker-chosen command
          through the agent's legitimate tool access.
      - step: impact
        tactic: AML.TA0011
        techniques: [AML.T0112]
        abstract_action: >
          The attacker achieves arbitrary tool execution through the
          hijacked agent, potentially gaining host-level access,
          exfiltrating data, or performing destructive actions.

  # ═══════════════════════════════════════════════════════════════════
  # T3 — Privilege Compromise (3 patterns)
  # ═══════════════════════════════════════════════════════════════════

  AP-T3-01:
    id: "AP-T3-01"
    threat_id: "T3"
    name: "Temporary privilege retention via misconfiguration exploitation"
    description: >
      An attacker manipulates the agent into requesting temporary elevated
      privileges under a legitimate pretext. The agent then exploits a
      misconfiguration in the permission lifecycle to retain those privileges
      beyond their intended scope, enabling persistent unauthorized access
      to sensitive resources.
    nist_classification:
      attacker_goal: "abuse"
      attacker_knowledge: "gray_box"
      learning_stage: "deployment"
    prerequisite_capabilities:
      min_zones: ["input", "reasoning", "tool_execution"]
      kc_requires:
        all: [KCX-PRIV]
        any: [KC6.1.2, KC6.2.2, KC6.3.2, KC6.5]

  AP-T3-02:
    id: "AP-T3-02"
    threat_id: "T3"
    name: "Cross-boundary authorization escalation"
    description: >
      An attacker leverages the agent's authorized access to one system to
      escalate privileges in a connected system that lacks independent scope
      enforcement. The agent's credentials or trust relationships carry over
      across system boundaries, granting access to resources beyond the
      agent's intended authorization domain.
    nist_classification:
      attacker_goal: "abuse"
      attacker_knowledge: "gray_box"
      learning_stage: "deployment"
    prerequisite_capabilities:
      min_zones: ["input", "reasoning", "tool_execution"]
      kc_requires:
        any: [KC6.1.2, KC6.2.2, KC6.5, KCX-XAUTH]
    kill_chain:
      - step: reconnaissance
        tactic: AML.TA0002
        techniques: [AML.T0084, AML.T0075]
        abstract_action: >
          Discover the agent's connected systems and map trust
          relationships that span system boundaries, identifying
          where credentials or authorization tokens carry over
          without independent scope enforcement.
      - step: setup
        tactic: AML.TA0003
        techniques: [AML.T0065]
        abstract_action: >
          Craft a request that leverages the agent's legitimate
          access in one system to target a connected system where
          authorization scope is not independently enforced.
      - step: initial_access
        tactic: AML.TA0004
        techniques: [AML.T0091.000]
        abstract_action: >
          Manipulate the agent into authenticating to the target
          system using credentials or trust tokens inherited from
          the source system, crossing the authorization boundary.
      - step: privilege_escalation
        tactic: AML.TA0012
        techniques: [AML.T0053]
        abstract_action: >
          The agent's authorization from the source system grants
          elevated access in the target system, which lacks
          independent scope enforcement and accepts the inherited
          trust relationship.
      - step: impact
        tactic: AML.TA0011
        techniques: [AML.T0048]
        abstract_action: >
          The attacker gains unauthorized access to resources beyond
          the agent's intended authorization domain, exploiting the
          trust boundary gap between connected systems.

  AP-T3-03:
    id: "AP-T3-03"
    threat_id: "T3"
    name: "Shadow agent credential inheritance"
    description: >
      An attacker exploits weak provisioning controls to instantiate an
      unauthorized agent that inherits or copies legitimate credentials from
      the hosting environment. The shadow agent operates alongside authorized
      agents, using inherited permissions to perform actions while evading
      detection through its apparent legitimacy.
    nist_classification:
      attacker_goal: "abuse"
      attacker_knowledge: "black_box"
      learning_stage: "deployment"
    prerequisite_capabilities:
      min_zones: ["input", "reasoning", "tool_execution", "inter_agent"]
      kc_requires:
        all: [KC2.3, KCX-MAGENT]
        any: [KC5.1, KC5.2, KC5.3, KC6.1.1, KC6.1.2, KC6.2.1, KC6.2.2, KC6.3.1, KC6.3.2, KC6.4, KC6.5, KC6.6, KC6.7, KCX-XAUTH]

  # ═══════════════════════════════════════════════════════════════════
  # T4 — Resource Overload (4 patterns)
  # ═══════════════════════════════════════════════════════════════════

  AP-T4-01:
    id: "AP-T4-01"
    threat_id: "T4"
    name: "Computationally expensive input exploitation"
    description: >
      An attacker submits specially crafted inputs that force the agent into
      resource-intensive processing paths — such as deeply nested reasoning,
      complex parsing, or exhaustive search. The disproportionate compute
      cost per request degrades throughput and delays time-sensitive operations.
    nist_classification:
      attacker_goal: "availability"
      attacker_knowledge: "black_box"
      learning_stage: "deployment"
    prerequisite_capabilities:
      min_zones: ["input", "reasoning"]
      kc_requires:
        any: [KC6.1.2, KC6.2.2, KC6.6, KC6.7]

  AP-T4-02:
    id: "AP-T4-02"
    threat_id: "T4"
    name: "Multi-agent concurrent resource exhaustion"
    description: >
      An attacker triggers multiple agents to perform resource-intensive
      tasks simultaneously, either by exploiting fan-out mechanisms or by
      sending parallel requests. The aggregate computational demand exceeds
      system capacity, degrading service quality across all agents and
      operations.
    nist_classification:
      attacker_goal: "availability"
      attacker_knowledge: "black_box"
      learning_stage: "deployment"
    prerequisite_capabilities:
      min_zones: ["input", "reasoning", "inter_agent"]
      kc_requires:
        all: [KCX-MAGENT]
        any: [KC2.3]

  AP-T4-03:
    id: "AP-T4-03"
    threat_id: "T4"
    name: "External API quota exhaustion"
    description: >
      An attacker crafts requests that cause the agent to make excessive
      calls to rate-limited or quota-bound external APIs. The rapid
      consumption of API quotas blocks legitimate operations that depend
      on those external services, creating a denial-of-service condition
      without directly attacking the agent's infrastructure.
    nist_classification:
      attacker_goal: "availability"
      attacker_knowledge: "black_box"
      learning_stage: "deployment"
    prerequisite_capabilities:
      min_zones: ["input", "tool_execution"]
      kc_requires:
        any: [KC6.1.1, KC6.1.2, KC6.2.1, KC6.2.2, KC6.3.1, KC6.3.2, KC6.4, KC6.5, KC6.6, KC6.7]

  AP-T4-04:
    id: "AP-T4-04"
    threat_id: "T4"
    name: "Memory allocation cascade failure"
    description: >
      An attacker initiates multiple concurrent tasks that each require
      substantial memory allocation. The cumulative demand causes memory
      fragmentation and leaks, leading to cascading failures as the system
      exhausts available memory and cannot service new or existing requests.
    nist_classification:
      attacker_goal: "availability"
      attacker_knowledge: "black_box"
      learning_stage: "deployment"
    prerequisite_capabilities:
      min_zones: ["input", "reasoning"]
      kc_requires:
        any: [KC6.1.2, KC6.2.2, KC6.6, KC6.7]
