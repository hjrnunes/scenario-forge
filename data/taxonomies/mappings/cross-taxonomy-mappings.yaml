  threats:
    - id: T7
      name: "Misaligned & Deceptive Behaviors"
      rationale: "Emerges from advanced reasoning — distinct from hallucinations"
    - id: T8
      name: "Repudiation & Untraceability"
      rationale: "Autonomous operation creates new forensics challenges"
    - id: T9
      name: "Identity Spoofing & Impersonation"
      rationale: "Agent-to-agent and agent-to-human identity is a new surface"
    - id: T10
      name: "Overwhelming Human in the Loop"
      rationale: "HITL is specific to agentic architectures"
    - id: T14
      name: "Human Attacks on Multi-Agent Systems"
      rationale: "Multi-agent delegation chains are a new attack surface"
    - id: T15
      name: "Human Manipulation"
      rationale: "AI-mediated social engineering is a new capability"
    - id: T16
      name: "Insecure Inter-Agent Protocol Abuse"
      rationale: "MCP/A2A protocols did not exist in the LLM-only era"

# ═══════════════════════════════════════════════════════════════════
# Coverage gaps identified
# ═══════════════════════════════════════════════════════════════════

gaps:
  - taxonomy: "ASI Top 10"
    gap: "No entry for T8 (Repudiation & Untraceability)"
    impact: "Auditability and forensic analysis of autonomous agent actions is not ranked as a top risk."
    recommendation: "Scenario-forge should still generate scenarios for T8 even though ASI doesn't rank it."

  - taxonomy: "NIST AI 100-2"
    gap: "No coverage of multi-agent threats (T12-T14), HITL attacks (T10), or agentic memory"
    impact: "NIST framework predates agentic AI; its classification dimensions apply but specific attack types are missing."
    recommendation: "Use NIST dimensions (attacker goals, capabilities, knowledge) to classify agentic-specific threats."

  - taxonomy: "MITRE ATLAS"
    gap: "Limited agentic-specific techniques; crosswalks map agentic risks to existing techniques"
    impact: "ATLAS techniques provide the TTP detail but don't yet have agentic-specific entries."
    recommendation: "Use ATLAS techniques as building blocks for multi-step agentic attack chains."

  - taxonomy: "GenAI Security Crosswalk (source JSON)"
    gap: "11 asymmetric ASI↔LLM cross-references in source JSON files"
    impact: >
      LLM02, LLM03, LLM06, LLM07, LLM10 reference ASI entries that do not reference
      those LLM entries back. May indicate incomplete editorial review in source data
      or intentional asymmetry (LLM→ASI refs are broader/more speculative).
    recommendation: "Flag when generating mappings; do not assume bidirectional consistency."

# ═══════════════════════════════════════════════════════════════════
# T ↔ ATLAS Mappings
# OWASP Agentic Threats (T1-T17) → MITRE ATLAS Techniques
#
# Composed via two paths:
#   1. T→LLM→ATLAS chain: T-threat maps to LLM Top 10 (from t_to_llm),
#      then LLM maps to ATLAS techniques (from crosswalk-llm-atlas.md).
#   2. Direct mapping: agentic-only threats (T7-T10, T14-T16) map
#      directly to ATLAS techniques via ASI→ATLAS (crosswalk-asi-atlas.md)
#      since they have no LLM predecessor.
#
# ATLAS technique IDs verified against MITRE ATLAS v2026.05 and
# GenAI Security Crosswalk 2026-Q2.
# ═══════════════════════════════════════════════════════════════════

t_to_atlas:
  # --- T-threats with LLM predecessors (via T→LLM→ATLAS chain) ---

  - source: T1
    source_name: "Memory Poisoning"
    targets: [AML.T0043, AML.T0031, AML.T0020, AML.T0071, AML.T0025, AML.T0070, AML.T0066]
    target_names:
