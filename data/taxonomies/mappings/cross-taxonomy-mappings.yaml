# Cross-Taxonomy Mappings for scenario-forge
# Generated from source data in data/taxonomies/
#
# Relationships:
#   T1-T17:   OWASP Agentic AI Threats & Mitigations v1.1 (17 foundational threats)
#   ASI01-10: OWASP Top 10 for Agentic Applications 2026 (ranked risk list)
#   LLM01-10: OWASP Top 10 for LLM Applications 2025 (ranked risk list)
#   ATLAS:    MITRE ATLAS v2026.05 (adversarial TTP knowledge base)
#   NIST:     NIST AI 100-2e2023 (classification framework)
#
# Mapping predicates follow SSSOM-lite conventions:
#   exact_match:    Concepts are identical or near-identical
#   broad_match:    Source is narrower than target (target covers more)
#   narrow_match:   Source is broader than target (target covers less)
#   related_match:  Concepts overlap but are not hierarchical
#   extends:        Source extends target with new capabilities or scope

source_quality_assessment:
  crosswalk_llm_atlas:
    source: "GenAI Security Crosswalk (OWASP)"
    file: "crosswalk-llm-atlas.md"
    quality: high
    notes: >
      Every LLM01-LLM10 entry has specific ATLAS technique IDs with tactic context,
      real-world incident references, tiered mitigations (foundational/hardening/advanced),
      tool recommendations, and cross-references. Well-maintained, versioned 2026-Q1.
      Suitable for direct use in scenario generation pipeline.
  crosswalk_asi_atlas:
    source: "GenAI Security Crosswalk (OWASP)"
    file: "crosswalk-asi-atlas.md"
    quality: high
    notes: >
      Same quality as LLM crosswalk. Adds "agentic amplifier" column explaining how
      agentic context escalates baseline ATLAS technique severity. Explicitly covers
      multi-step attack chains and compounding blast radius. Production-ready.
  asi_llm_crossrefs:
    source: "GenAI Security Crosswalk JSON (embedded crossrefs)"
    quality: high
    notes: >
      Bidirectional ASI↔LLM references embedded in each JSON entry. Core forward
      mappings (ASI→LLM) are internally consistent, but 11 asymmetric pairs exist
      where an LLM entry references an ASI entry that does not reciprocate. Affected
      LLM entries: LLM02 (refs ASI01/02/03/06 unreciprocated), LLM03 (refs ASI07/10
      unreciprocated), LLM06 (refs ASI07/09 unreciprocated), LLM07 (refs ASI01/02
      unreciprocated), LLM10 (refs ASI10 unreciprocated). These asymmetries originate
      in the source JSON files, not in this mapping.

# ═══════════════════════════════════════════════════════════════════
# T ↔ ASI Mappings
# OWASP Agentic Threats (T1-T17) ↔ OWASP Agentic Top 10 (ASI01-ASI10)
#
# These are two documents from the same OWASP ASI initiative:
#   T1-T17 = foundational threat catalog (Feb 2025, updated Dec 2025)
#   ASI01-ASI10 = ranked risk list (2026)
# The T-threats are more granular; the ASI entries consolidate related
# threats into prioritized risk categories. Many T-threats map to a
# single ASI entry, but some T-threats cross ASI boundaries.
# ═══════════════════════════════════════════════════════════════════

t_to_asi:
  - source: T1
    source_name: "Memory Poisoning"
    target: ASI06
    target_name: "Memory and Context Poisoning"
    predicate: exact_match
    confidence: 1.0
    notes: "Both address corruption of agent memory. ASI06 adds context window scope."

  - source: T2
    source_name: "Tool Misuse"
    target: ASI02
    target_name: "Tool Misuse and Exploitation"
    predicate: exact_match
    confidence: 1.0
    notes: "Direct conceptual match. ASI02 adds exploitation angle beyond misuse."

  - source: T3
    source_name: "Privilege Compromise"
    target: ASI03
    target_name: "Identity and Privilege Abuse"
    predicate: narrow_match
    confidence: 0.9
    notes: "T3 focuses on privilege escalation; ASI03 covers both identity and privilege."

  - source: T4
    source_name: "Resource Overload"
    target: ASI08
    target_name: "Cascading Agent Failures"
    predicate: related_match
    confidence: 0.7
    notes: "T4 is about resource exhaustion; ASI08 covers cascading failures broadly including resource exhaustion as one mechanism."

  - source: T5
    source_name: "Cascading Hallucination Attacks"
    target: ASI09
    target_name: "Human-Agent Trust Exploitation"
    predicate: related_match
    confidence: 0.6
    notes: "T5 focuses on hallucination propagation; ASI09 covers trust exploitation which includes hallucination-enabled deception. Partial overlap."

  - source: T5
    source_name: "Cascading Hallucination Attacks"
    target: ASI08
    target_name: "Cascading Agent Failures"
    predicate: related_match
    confidence: 0.5
    notes: "T5 hallucination cascades are one mechanism that can trigger ASI08 cascading failures across agents."

  - source: T6
    source_name: "Intent Breaking & Goal Manipulation"
    target: ASI01
    target_name: "Agent Goal Hijack"
    predicate: exact_match
    confidence: 1.0
    notes: "Both address the same core threat of redirecting agent objectives."

  - source: T7
    source_name: "Misaligned & Deceptive Behaviors"
    target: ASI10
    target_name: "Rogue Agents"
    predicate: related_match
    confidence: 0.8
    notes: "T7 covers emergent misalignment (single agent); ASI10 covers rogue behavior in multi-agent context. Overlapping but different scopes."

  - source: T8
    source_name: "Repudiation & Untraceability"
    target: null
    predicate: no_match
    confidence: 1.0
    notes: "No ASI entry directly addresses auditability/forensics. This is a gap in ASI Top 10."

  - source: T9
    source_name: "Identity Spoofing & Impersonation"
    target: ASI03
    target_name: "Identity and Privilege Abuse"
    predicate: narrow_match
    confidence: 0.8
    notes: "T9 focuses on identity spoofing specifically; ASI03 covers broader identity+privilege abuse."

  - source: T10
    source_name: "Overwhelming Human in the Loop"
    target: ASI09
    target_name: "Human-Agent Trust Exploitation"
    predicate: narrow_match
    confidence: 0.8
    notes: "T10 is a specific mechanism (decision fatigue); ASI09 covers trust exploitation broadly."

  - source: T11
    source_name: "Unexpected RCE and Code Attacks"
    target: ASI05
    target_name: "Unexpected Code Execution"
    predicate: exact_match
    confidence: 1.0
    notes: "Both address the same threat of AI-generated code execution."

  - source: T12
    source_name: "Agent Communication Poisoning"
    target: ASI07
    target_name: "Insecure Inter-Agent Communications"
    predicate: exact_match
    confidence: 0.95
    notes: "T12 focuses on poisoning; ASI07 covers all insecure comms including poisoning."

  - source: T13
    source_name: "Rogue Agents in Multi-Agent Systems"
    target: ASI10
    target_name: "Rogue Agents"
    predicate: exact_match
    confidence: 1.0
    notes: "Direct match. Both cover malicious or compromised agents in multi-agent systems."

  - source: T14
    source_name: "Human Attacks on Multi-Agent Systems"
    target: ASI09
    target_name: "Human-Agent Trust Exploitation"
    predicate: related_match
    confidence: 0.6
    notes: "T14 covers human adversaries exploiting multi-agent delegation; ASI09 covers human-agent trust broadly. Different emphasis."

  - source: T14
    source_name: "Human Attacks on Multi-Agent Systems"
    target: ASI03
    target_name: "Identity and Privilege Abuse"
    predicate: related_match
    confidence: 0.6
    notes: "T14's privilege escalation via multi-agent impersonation maps to ASI03's scope."

  - source: T15
    source_name: "Human Manipulation"
    target: ASI09
    target_name: "Human-Agent Trust Exploitation"
    predicate: narrow_match
    confidence: 0.85
    notes: "T15 is specifically about AI manipulating humans; ASI09 covers this plus broader trust issues."

  - source: T16
    source_name: "Insecure Inter-Agent Protocol Abuse"
    target: ASI07
    target_name: "Insecure Inter-Agent Communications"
    predicate: narrow_match
    confidence: 0.9
    notes: "T16 focuses on protocol-level abuse (MCP, A2A); ASI07 covers all inter-agent security."

  - source: T17
    source_name: "Supply Chain Compromise"
    target: ASI04
    target_name: "Agentic Supply Chain"
    predicate: exact_match
    confidence: 1.0
    notes: "Direct match. Both address supply chain compromise in agentic systems."

