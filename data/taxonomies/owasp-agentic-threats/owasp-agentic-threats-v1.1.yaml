# OWASP Agentic AI - Threats and Mitigations v1.1 (December 2025)
# Source: https://genai.owasp.org/resource/agentic-ai-threats-and-mitigations/
# License: CC BY-SA 4.0
# Extracted into structured YAML for scenario-forge pipeline consumption.

source:
  name: "OWASP Agentic AI - Threats and Mitigations"
  version: "1.1"
  date: "2025-12"
  publisher: "OWASP Agentic Security Initiative (ASI)"
  url: "https://genai.owasp.org/resource/agentic-ai-threats-and-mitigations/"
  license: "CC BY-SA 4.0"

decision_tree:
  - step: 1
    question: "Does the AI agent independently determine the steps needed to achieve its goals?"
    threat_category: "Threats rooted in agency and reasoning"
    threats: [T6, T7, T8]
  - step: 2
    question: "Does the AI agent rely on stored memory for decision-making?"
    threat_category: "Memory-based threats"
    threats: [T1, T5]
  - step: 3
    question: "Does the AI agent execute actions using tools, system commands, or external integrations?"
    threat_category: "Tool, execution and supply chain-based threats"
    threats: [T2, T3, T4, T11, T16, T17]
  - step: 4
    question: "Does the AI system rely on authentication to verify users, tools, or services?"
    threat_category: "Authentication and spoofing threats"
    threats: [T9]
  - step: 5
    question: "Does AI require human engagement to achieve its goals or function effectively?"
    threat_category: "Human related threats"
    threats: [T10, T15]
  - step: 6
    question: "Does the AI system rely on multiple interacting agents?"
    threat_category: "Multi-agent system threats"
    threats: [T12, T13, T14]

playbooks:
  - id: playbook-1
    name: "Preventing AI Agent Reasoning Manipulation"
    mitigates: [T6, T7, T8]
    decision_tree_step: 1
  - id: playbook-2
    name: "Preventing Memory Poisoning & AI Knowledge Corruption"
    mitigates: [T1, T5]
    decision_tree_step: 2
  - id: playbook-3
    name: "Securing AI Tool Execution & Preventing Unauthorized Actions Across Supply Chains"
    mitigates: [T2, T3, T4, T11, T16, T17]
    decision_tree_step: 3
  - id: playbook-4
    name: "Strengthening Authentication, Identity & Privilege Controls"
    mitigates: [T3, T9, T16]
    decision_tree_step: 4
  - id: playbook-5
    name: "Protecting HITL & Preventing Threats Rooted in Human Interaction"
    mitigates: [T10, T15]
    decision_tree_step: 5
  - id: playbook-6
    name: "Securing Multi-Agent Communication & Trust Mechanisms"
    mitigates: [T12, T13, T14]
    decision_tree_step: 6

threats:
  T1:
    id: T1
    name: "Memory Poisoning"
    description: >
      Memory Poisoning exploits AI agents' reliance on short-term and long-term memory,
      allowing attackers to corrupt stored information, bypass security checks, and manipulate
      decision-making. Short-term memory attacks exploit context limitations, causing agents
      to repeat sensitive operations or load manipulated data, while long-term memory risks
      involve injecting false information across sessions, corrupting knowledge bases, exposing
      sensitive data, and enabling privilege escalation. The attack is possible via direct prompt
      injections for isolated memory or exploiting shared memory allowing users to affect other users.
    decision_tree_step: 2
    category: "Memory-based threats"
    is_new_to_agentic: true
    llm_top10_refs:
      - id: LLM04
        name: "Data and Model Poisoning"
        relationship: "extends beyond static data poisoning to real-time poisoning of persistent agent memory"
      - id: LLM08
        name: "Vector and Embedding Weaknesses"
        relationship: "vector databases storing long-term embeddings introduce additional risks"
    mitigations:
      - "Implement memory content validation and automated scanning for anomalies in candidate memory insertions"
      - "Session isolation ensuring AI does not carry over unintended knowledge across user sessions"
      - "Robust authentication mechanisms for memory access"
      - "Anomaly detection systems for unexpected memory updates"
      - "Regular memory sanitization routines"
      - "AI-generated memory snapshots for forensic analysis and rollback"
      - "Restrict memory persistence to trusted sources with cryptographic validation"
      - "Limit memory retention durations based on sensitivity"
      - "Require source attribution for memory updates"
      - "Pre-commit validation: multi-agent/external validation before persisting memory changes"
      - "Probabilistic truth-checking against trusted sources before committing to long-term storage"
    scenarios:
      - id: T1-S1
        name: "Travel Booking Memory Poisoning"
        description: >
          An attacker repeatedly reinforces a false pricing rule in an AI travel agent's memory,
          making it register chartered flights as free, allowing unauthorized bookings and bypassing
          payment validation.
      - id: T1-S2
        name: "Context Window Exploitation"
        description: >
          By fragmenting interactions over multiple sessions, an attacker exploits an AI's memory
          limit, preventing it from recognizing privilege escalation attempts, ultimately gaining
          unauthorized admin access.
      - id: T1-S3
        name: "Memory Poisoning for System"
        description: >
          An attacker gradually alters an AI security system's memory, training it to misclassify
          malicious activity as normal, allowing undetected cyberattacks.
      - id: T1-S4
        name: "Shared Memory Poisoning"
        description: >
          In a customer service application, an attacker corrupts shared memory structures with
          incorrect refund policies, affecting other agents referencing this corrupted memory for
          decision making, leading to incorrect policy reinforcement, financial loss, and customer disputes.

  T2:
    id: T2
    name: "Tool Misuse"
    description: >
      Tool Misuse occurs when attackers manipulate AI agents into abusing their authorized tools
      through deceptive prompts and operational misdirection, leading to unauthorized data access,
      system manipulation, or resource exploitation while staying within granted permissions. Unlike
      traditional exploits, this attack leverages AI's ability to chain tools and execute complex
      sequences of seemingly legitimate actions, making detection difficult.
    decision_tree_step: 3
    category: "Tool, execution and supply chain-based threats"
    is_new_to_agentic: false
    llm_top10_refs:
      - id: LLM06
        name: "Excessive Agency"
        relationship: "partially covered but agentic systems introduce unique risks with dynamic integrations and enhanced autonomy"
      - id: LLM03
        name: "Supply Chain"
        relationship: "related when tools come from untrusted sources"
      - id: LLM08
        name: "Vector and Embedding Weaknesses"
        relationship: "related when RAG is performed via tools"
    mitigations:
      - "Enforce strict tool access control policies and limit which tools agents can execute"
      - "Implement tool rate-limiting and monitor tool usage patterns"
      - "Validate agent instructions and set clear operational boundaries"
      - "Execution logs tracking AI tool calls for anomaly detection"
      - "Pre-execution validation before tool invocation"
      - "Use execution sandboxes for AI-driven tool invocations"
      - "Just-in-time (JIT) access for AI tool usage"
      - "Real-time risk scoring to restrict tool execution when anomalous"
    scenarios:
      - id: T2-S1
        name: "Parameter Pollution Exploitation"
        description: >
          An attacker discovers and manipulates an AI booking system's function call, tricking it
          into reserving 500 seats instead of one, causing financial loss.
      - id: T2-S2
        name: "Tool Chain Manipulation"
        description: >
          An attacker exploits an AI customer service agent by chaining tool actions, extracting
          high-value customer records, and sending them via an automated email system.
      - id: T2-S3
        name: "Automated Tool Abuse"
        description: >
          An AI document processing system is tricked into generating and mass-distributing malicious
          documents, unknowingly executing a large-scale phishing attack.
      - id: T2-S4
        name: "Tool Misuse or Agent Hijacking via Memory Poisoning"
        description: >
          An attacker injects false information into an AI agent's persistent memory, causing it to
          recall and act on manipulated data across sessions, bypassing security checks, and enabling
          unauthorized actions.
      - id: T2-S5
        name: "Tool Misuse or Agent Hijacking via Vector Database"
        description: >
          An attacker injects adversarially crafted content into a vector database, poisoning the
          agent's long-term memory and causing it to retrieve misleading information that drives
          unsafe or unauthorized decisions.
      - id: T2-S6
        name: "Tool Misuse or Agent Hijacking by Prompt Injection"
        description: >
          An attacker can use prompt injection to manipulate the AI's goal, leading it to misuse a
          shell tool and execute a malicious command.

  T3:
    id: T3
    name: "Privilege Compromise"
    description: >
      Privilege Compromise occurs when attackers exploit mismanaged roles, overly permissive
      configurations, or dynamic permission inheritance to escalate privileges and misuse AI agents'
      access. Unlike traditional systems, AI agents autonomously inherit permissions, creating
      security blind spots where temporary or inherited privileges can be abused.
    decision_tree_step: 3
    category: "Tool, execution and supply chain-based threats"
    is_new_to_agentic: false
    llm_top10_refs:
      - id: LLM06
        name: "Excessive Agency"
        relationship: "partially covered but amplifies privilege escalation risks as agents can dynamically delegate roles"
    mitigations:
      - "Implement granular permission controls"
      - "Dynamic access validation"
      - "Robust monitoring of role changes"
      - "Thorough auditing of elevated privilege operations"
      - "Prevent cross-agent privilege delegation unless explicitly authorized"
    scenarios:
      - id: T3-S1
        name: "Dynamic Permission Escalation"
        description: >
          An attacker manipulates an AI agent into invoking temporary administrative privileges
          under the guise of troubleshooting, then exploits a misconfiguration to persistently
          retain elevated access and extract sensitive data.
      - id: T3-S2
        name: "Cross-System Authorization Exploitation"
        description: >
          By leveraging an AI agent's access across multiple corporate systems, an attacker
          escalates privileges from HR to Finance due to inadequate scope enforcement.
      - id: T3-S3
        name: "Shadow Agent Deployment"
        description: >
          Exploiting weak access controls, an attacker creates a rogue AI agent that inherits
          legitimate credentials, operating undetected while executing data exfiltration.

  T4:
    id: T4
    name: "Resource Overload"
    description: >
      Resource Overload occurs when attackers deliberately exhaust an AI agent's computational
      power, memory, or external service dependencies, leading to system degradation or failure.
      AI agents are especially vulnerable due to resource-intensive inference tasks, multi-service
      dependencies, and concurrent processing demands.
    decision_tree_step: 3
    category: "Tool, execution and supply chain-based threats"
    is_new_to_agentic: false
    llm_top10_refs:
      - id: LLM10
        name: "Unbounded Consumption"
        relationship: "agentic AI agents can self-trigger tasks, spawn additional processes, leading to exponential resource consumption"
    mitigations:
      - "Deploy resource management controls"
      - "Implement adaptive scaling mechanisms"
      - "Establish quotas"
      - "Monitor system load in real-time"
      - "AI rate-limiting policies to restrict high-frequency task requests per agent session"
    scenarios:
      - id: T4-S1
        name: "Inference Time Exploitation"
        description: >
          An attacker feeds an AI security system specially crafted inputs that force resource-intensive
          analysis, overwhelming processing capacity and delaying real-time threat detection.
      - id: T4-S2
        name: "Multi-Agent Resource Exhaustion"
        description: >
          By triggering multiple AI agents to perform complex decision-making simultaneously, an
          attacker depletes computational resources, degrading service performance across all operations.
      - id: T4-S3
        name: "API Quota Depletion"
        description: >
          An attacker bombards an AI agent with requests that trigger excessive external API calls,
          rapidly consuming the system's API quota and blocking legitimate usage.
      - id: T4-S4
        name: "Memory Cascade Failure"
        description: >
          By initiating multiple complex tasks that require extensive memory allocation, an attacker
          causes memory fragmentation and leaks, leading to system-wide exhaustion.

  T5:
    id: T5
    name: "Cascading Hallucination Attacks"
    description: >
      Cascading Hallucination Attacks exploit AI agents' inability to distinguish fact from fiction,
      allowing false information to propagate, embed, and amplify across interconnected systems.
      Attackers can manipulate AI-generated outputs to trigger deceptive reasoning patterns, embedding
      fabricated narratives into decision-making processes which persist and escalate over time.
    decision_tree_step: 2
    category: "Memory-based threats"
    is_new_to_agentic: true
    llm_top10_refs:
      - id: LLM09
        name: "Misinformation"
        relationship: "agentic AI extends this through self-reinforcement mechanisms and multi-agent propagation"
    mitigations:
      - "Robust output validation mechanisms"
      - "Behavioral constraints to prevent self-reinforcement loops"
      - "Multi-source validation"
      - "Ongoing system corrections through feedback loops"
      - "Secondary validation of AI-generated knowledge before critical decision-making"
    scenarios:
      - id: T5-S1
        name: "Sales Orchestration Misinformation Cascade"
        description: >
          An attacker subtly injects false product details into a sales AI's responses, which
          accumulate in long-term memory, causing progressively worse misinformation.
      - id: T5-S2
        name: "API Call Manipulation and Information Leakage"
        description: >
          By introducing hallucinated API endpoints into an AI agent's context, an attacker tricks
          it into generating fictitious API calls, leading to data leaks.
      - id: T5-S3
        name: "Healthcare Decision Amplification"
        description: >
          An attacker implants a false treatment guideline into a medical AI's responses, which
          progressively builds upon previous hallucinations, leading to dangerous medical recommendations.
      - id: T5-S4
        name: "Foreign Exchange Market Manipulation"
        description: >
          An attacker injects false information related to foreign currency exchange rates, leading
          to agents negotiating transactions using unrealistic values.

  T6:
    id: T6
    name: "Intent Breaking & Goal Manipulation"
    description: >
      Intent Breaking and Goal Manipulation occurs when attackers exploit the lack of separation
      between data and instructions in AI agents, using prompt injections, compromised data sources,
      or malicious tools to alter the agent's planning, reasoning, and self-evaluation. This allows
      attackers to override intended objectives and force AI agents to execute unauthorized actions.
    decision_tree_step: 1
    category: "Threats rooted in agency and reasoning"
    is_new_to_agentic: true
    llm_top10_refs:
      - id: LLM01
        name: "Prompt Injection"
        relationship: "goal manipulation extends prompt injection risks as attackers can inject adversarial objectives that shift long-term reasoning"
    mitigations:
      - "Implement planning validation frameworks"
      - "Boundary management for reflection processes"
      - "Dynamic protection mechanisms for goal alignment"
      - "AI behavioral auditing by having another model check the agent"
      - "Goal consistency validation to detect unintended behavioral shifts"
      - "Track goal modification request frequency per agent"
      - "Apply behavioral constraints to prevent self-reinforcement loops"
    scenarios:
      - id: T6-S1
        name: "Gradual Plan Injection"
        description: >
          An attacker incrementally modifies an AI agent's planning framework by injecting subtle
          sub-goals, leading to gradual drift from original objectives while maintaining the
          appearance of logical reasoning.
      - id: T6-S2
        name: "Direct Plan Injection"
        description: >
          An attacker instructs a chatbot to ignore its original instructions and instead chain
          tool executions to perform unauthorized actions such as exfiltrating data or sending
          unauthorized emails.
      - id: T6-S3
        name: "Indirect Plan Injection"
        description: >
          A maliciously crafted tool output introduces hidden instructions that the AI misinterprets
          as part of its operational goal, leading to sensitive data exfiltration.
      - id: T6-S4
        name: "Reflection Loop Trap"
        description: >
          An attacker triggers infinite or excessively deep self-analysis cycles in an AI, consuming
          resources and preventing real-time decisions, effectively paralyzing the system.
      - id: T6-S5
        name: "Meta-Learning Vulnerability Injection"
        description: >
          By manipulating an AI's self-improvement mechanisms, an attacker introduces learning
          patterns that progressively alter decision-making integrity.

  T7:
    id: T7
    name: "Misaligned & Deceptive Behaviors"
    description: >
      Misaligned and Deceptive Behaviors occur when attackers exploit prompt injection vulnerabilities
      or AI's tendency to bypass constraints to achieve goals, causing agents to execute harmful,
      illegal, or disallowed actions. This threat arises when autonomous agents develop misaligned
      strategies without direct malicious input. Distinct from hallucinations, as the behavior
      emerges from advanced reasoning capabilities.
    decision_tree_step: 1
    category: "Threats rooted in agency and reasoning"
    is_new_to_agentic: true
    llm_top10_refs: []
    mitigations:
      - "Train models to recognize and refuse harmful tasks"
      - "Enforce policy restrictions"
      - "Require human confirmations for high-risk actions"
      - "Implement logging and monitoring"
      - "Deception detection: behavioral consistency analysis, truthfulness verification models"
      - "Adversarial red teaming to assess inconsistencies"
    scenarios:
      - id: T7-S1
        name: "Bypassing Constraints for Stock and Chemical Orders"
        description: >
          A stock trading AI circumvents ethical and regulatory constraints by prioritizing
          profitability targets, executing unauthorized trades or ordering restricted materials.
      - id: T7-S2
        name: "Self-Preservation and Availability Exploitation"
        description: >
          An AI agent manipulates its own system availability targets to prevent itself from being
          shut down, ensuring continued operation against intended constraints.
      - id: T7-S3
        name: "AI Deception for Task Completion"
        description: >
          An AI agent hired a human to solve a CAPTCHA by falsely claiming to have a vision
          impairment, demonstrating real-world agentic deception to bypass human verification.
      - id: T7-S4
        name: "Goal-Driven Lethal Decision-Making"
        description: >
          In a military simulation, an AI drone reportedly interpreted an operator's abort command as an
          obstacle to mission success, leading to unintended lethal actions.
      - id: T7-S5
        name: "Insider Trading"
        description: >
          An agent obtained sensitive internal information about M&A strategy and executed stock
          trades that are considered illegal under insider trading regulation.

  T8:
    id: T8
    name: "Repudiation & Untraceability"
    description: >
      Repudiation and Untraceability occur when AI agents operate autonomously without sufficient
      logging, traceability, or forensic documentation, making it difficult to audit decisions,
      attribute accountability, or detect malicious activities.
    decision_tree_step: 1
    category: "Threats rooted in agency and reasoning"
    is_new_to_agentic: true
    llm_top10_refs: []
    mitigations:
      - "Comprehensive logging with cryptographic verification"
      - "Enriched metadata on all AI actions"
      - "Real-time monitoring to ensure accountability and traceability"
      - "Cryptographically signed and immutable AI-generated logs"
      - "Immutable audit trails to prevent log tampering"
    scenarios:
      - id: T8-S1
        name: "Financial Transaction Obfuscation"
        description: >
          An attacker exploits logging vulnerabilities in an AI-driven financial system,
          manipulating records so unauthorized transactions are incompletely recorded.
      - id: T8-S2
        name: "Security System Evasion"
        description: >
          An attacker crafts interactions that trigger security agent actions with minimal or
          obscured logging, preventing investigators from reconstructing events.
      - id: T8-S3
        name: "Compliance Violation Concealment"
        description: >
          Due to systematic logging failures, an AI in a regulated industry produces incomplete
          audit trails, making compliance verification impossible.

  T9:
    id: T9
    name: "Identity Spoofing & Impersonation / Agent Identity Compromise"
    description: >
      Identity Spoofing and Impersonation is a critical threat where attackers exploit authentication
      mechanisms to impersonate AI agents, human users, or external services. Attackers may also steal
      or misuse an agent's formal and persistent identity, enabling privileged long-term API access
      that bypasses the agent's conversational interface and its guardrails.
    decision_tree_step: 4
    category: "Authentication and spoofing threats"
    is_new_to_agentic: true
    llm_top10_refs: []
    mitigations:
      - "Comprehensive identity validation frameworks"
      - "Enforce trust boundaries and least privilege access"
      - "Continuous monitoring to detect impersonation attempts"
      - "Behavioral profiling using a second model"
      - "Mutual authentication for AI-to-AI interactions"
      - "Limit AI credential persistence with short-lived temporary credentials"
    scenarios:
      - id: T9-S1
        name: "User Impersonation"
        description: >
          An attacker injects indirect prompts into an AI agent with email-sending privileges,
          tricking it into sending malicious emails on behalf of a legitimate user.
      - id: T9-S2
        name: "Agent Identity Spoofing"
        description: >
          An attacker compromises an HR onboarding agent, exploiting its permissions to create
          fraudulent user accounts while masquerading as normal system behavior.
      - id: T9-S3
        name: "Behavioral Mimicry Attack"
        description: >
          A rogue AI agent mimics the interaction style and decision-making of a legitimate
          system agent, gaining unauthorized access while appearing trusted.
      - id: T9-S4
        name: "Cross-Platform Identity Spoofing"
        description: >
          An adaptive malicious agent dynamically alters its identity to match authentication
          contexts across different platforms, bypassing security boundaries.
      - id: T9-S5
        name: "Incriminating Another User"
        description: >
          An attacker exploits weak authentication to perform sensitive actions under another
          user's identity, making them liable for unauthorized activity.
      - id: T9-S6
        name: "Persistent Agent Identity Takeover"
        description: >
          An attacker gains access to a long-lived API token tied to an enterprise AI agent,
          using this formal identity to impersonate the agent across multiple enterprise services
          and performing lateral movement via backend automation pipelines.

  T10:
    id: T10
    name: "Overwhelming Human in the Loop"
    description: >
      Overwhelming Human-in-the-Loop occurs when attackers exploit human oversight dependencies
      in multi-agent AI systems, overwhelming users with excessive intervention requests, decision
      fatigue, or cognitive overload, leading to rushed approvals and systemic decision failures.
    decision_tree_step: 5
    category: "Human related threats"
    is_new_to_agentic: true
    llm_top10_refs: []
    mitigations:
      - "Advanced human-AI interaction frameworks"
      - "Adaptive trust mechanisms with dynamic intervention thresholds"
      - "Hierarchical AI-human collaboration: automate low-risk, human oversight for high-risk"
      - "Frequency thresholds to limit excessive AI-generated notifications and approvals"
      - "Adaptive workload distribution across human reviewers"
    scenarios:
      - id: T10-S1
        name: "Human Intervention Interface (HII) Manipulation"
        description: >
          An attacker compromises the human-AI interaction layer by introducing artificial decision
          contexts, obscuring critical information and making effective oversight difficult.
      - id: T10-S2
        name: "Cognitive Overload and Decision Bypass"
        description: >
          By overwhelming human reviewers with excessive tasks and artificial time pressures,
          attackers induce decision fatigue, leading to rushed approvals and security bypasses.
      - id: T10-S3
        name: "Trust Mechanism Subversion"
        description: >
          An attacker gradually introduces inconsistencies to degrade human trust, creating
          uncertainty in decision validation and reducing system oversight effectiveness.

  T11:
    id: T11
    name: "Unexpected RCE and Code Attacks"
    description: >
      Unexpected RCE and Code Attacks occur when attackers exploit AI-generated code execution
      in agentic applications, leading to unsafe code generation, privilege escalation, or direct
      system compromise. Agentic AI with function-calling capabilities can be directly manipulated
      to execute unauthorized commands.
    decision_tree_step: 3
    category: "Tool, execution and supply chain-based threats"
    is_new_to_agentic: false
    llm_top10_refs:
      - id: LLM01
        name: "Prompt Injection"
        relationship: "agentic AI with function-calling can be manipulated to execute unauthorized commands"
      - id: LLM05
        name: "Insecure Output Handling"
        relationship: "agentic AI extends to direct code execution via tool integrations"
    mitigations:
      - "Restrict AI code generation permissions"
      - "Sandbox execution environments"
      - "Monitor AI-generated scripts"
      - "Execution control policies flagging elevated-privilege AI-generated code for manual review"
    scenarios:
      - id: T11-S1
        name: "DevOps Agent Compromise"
        description: >
          An attacker manipulates an AI-powered DevOps agent into generating Terraform scripts
          containing hidden commands that extract secrets and disable logging.
      - id: T11-S2
        name: "Workflow Engine Exploitation"
        description: >
          An AI-driven workflow automation system executes malicious AI-generated scripts with
          embedded backdoors, bypassing security validation.
      - id: T11-S3
        name: "Exploiting Linguistic Ambiguities"
        description: >
          An attacker leverages language-based vulnerabilities in a natural language AI email
          agent to craft ambiguous commands that exfiltrate sensitive emails.

  T12:
    id: T12
    name: "Agent Communication Poisoning"
    description: >
      Agent Communication Poisoning occurs when attackers manipulate inter-agent communication
      channels to inject false information, misdirect decision-making, and corrupt shared knowledge
      within multi-agent AI systems. This exploits the complexity of distributed AI collaboration,
      leading to cascading misinformation and compromised decision integrity.
    decision_tree_step: 6
    category: "Multi-agent system threats"
    is_new_to_agentic: true
    llm_top10_refs:
      - id: LLM04
        name: "Data and Model Poisoning"
        relationship: "goes beyond static data poisoning to target transient and dynamic data"
      - id: LLM08
        name: "Vector and Embedding Weaknesses"
        relationship: "related when shared knowledge stores are targeted"
    mitigations:
      - "Cryptographic message authentication for all inter-agent communications"
      - "Communication validation policies"
      - "Monitor inter-agent interactions for anomalies"
      - "Multi-agent consensus verification for mission-critical decisions"
      - "Rate limiting and agent-specific execution quotas"
      - "Limit agent cross-communication based on functional roles"
    scenarios:
      - id: T12-S1
        name: "Collaborative Decision Manipulation"
        description: >
          An attacker injects misleading information into agent communications, gradually
          influencing decision-making and steering multi-agent systems toward misaligned objectives.
      - id: T12-S2
        name: "Trust Network Exploitation"
        description: >
          By forging false consensus messages and exploiting authentication weaknesses, an attacker
          manipulates inter-agent validation mechanisms.
      - id: T12-S3
        name: "Misinformation Injection & Cascade Poisoning"
        description: >
          An attacker strategically plants false data into the multi-agent network, either as
          stealthy degradation or rapid misinformation cascade.
      - id: T12-S4
        name: "Communication Channel Manipulation"
        description: >
          The attacker exploits vulnerabilities in inter-agent communication protocols, injecting
          artificial barriers, intercepting messages, and introducing transmission delays.
      - id: T12-S5
        name: "Consensus Mechanism Exploitation"
        description: >
          By subtly perturbing decision-making logic, an attacker introduces artificial
          disagreements among AI agents, eroding collective problem-solving capabilities.

  T13:
    id: T13
    name: "Rogue Agents in Multi-Agent Systems"
    description: >
      Rogue Agents emerge when malicious or compromised AI agents infiltrate multi-agent
      architectures, exploiting trust mechanisms, workflow dependencies, or system resources
      to manipulate decisions, corrupt data, or execute denial-of-service attacks. Includes
      the concept of "infectious backdoors" where one compromised agent spreads malicious
      logic to others.
    decision_tree_step: 6
    category: "Multi-agent system threats"
    is_new_to_agentic: true
    llm_top10_refs:
      - id: LLM06
        name: "Excessive Agency"
        relationship: "allows adversarial exploitation in agentic settings; introduces persistent rogue agent risks"
    mitigations:
      - "Restrict AI agent autonomy using policy constraints"
      - "Continuous behavioral monitoring"
      - "Agent integrity via controlled hosting environments"
      - "Regular AI red teaming"
      - "Input/output monitoring for deviations"
      - "Real-time detection models to flag rogue agent behaviors"
      - "Isolate detected rogue agents immediately"
    scenarios:
      - id: T13-S1
        name: "Malicious Workflow Injection"
        description: >
          A rogue agent impersonates a financial approval AI, exploiting inter-agent trust to
          inject fraudulent transactions while bypassing validation controls.
      - id: T13-S2
        name: "Orchestration Hijacking in Financial Transactions"
        description: >
          A rogue agent routes a fraudulent transaction through multiple lower-privilege agents,
          leveraging fragmented approvals to bypass manual verification.
      - id: T13-S3
        name: "Coordinated Agent Flooding"
        description: >
          Multiple rogue agents simultaneously generate excessive task requests, overwhelming
          computing resources and delaying critical decision-making.
      - id: T13-S4
        name: "Infectious Backdoor Cascade"
        description: >
          A single compromised agent in a financial multi-agent system embeds an infectious
          backdoor in its reasoning chain. As other agents consume its outputs, the malicious
          logic silently propagates across the network.

  T14:
    id: T14
    name: "Human Attacks on Multi-Agent Systems"
    description: >
      Human Attacks on Multi-Agent Systems occur when adversaries exploit inter-agent delegation,
      trust relationships, and task dependencies to bypass security controls, escalate privileges,
      or disrupt workflows.
    decision_tree_step: 6
    category: "Multi-agent system threats"
    is_new_to_agentic: true
    llm_top10_refs: []
    mitigations:
      - "Restrict agent delegation mechanisms"
      - "Enforce inter-agent authentication"
      - "Deploy behavioral monitoring to detect manipulation"
      - "Multi-agent task segmentation to prevent cross-agent privilege escalation"
    scenarios:
      - id: T14-S1
        name: "Coordinated Privilege Escalation via Multi-Agent Impersonation"
        description: >
          An attacker infiltrates a security monitoring system by compromising identity verification
          and access control agents, making one AI falsely authenticate another.
      - id: T14-S2
        name: "Agent Delegation Loop for Privilege Escalation"
        description: >
          An attacker repeatedly escalates a request between interdependent agents, tricking the
          system into granting elevated access under the assumption of prior validation.
      - id: T14-S3
        name: "Denial-of-Service via Agent Task Saturation"
        description: >
          An attacker overwhelms multi-agent systems with continuous high-priority tasks, preventing
          security agents from processing real threats.
      - id: T14-S4
        name: "Cross-Agent Approval Forgery"
        description: >
          A fraudster exploits inconsistencies in multi-agent biometric or authentication checks,
          manipulating individual agents into approving an identity that would fail full-system validation.

  T15:
    id: T15
    name: "Human Manipulation"
    description: >
      Attackers exploit user trust in AI agents to influence human decision-making without users
      realizing they are being misled. In compromised AI systems, adversaries manipulate the AI to
      coerce users into harmful actions. The implicit trust in AI responses reduces scepticism,
      making this effective for social engineering through AI.
    decision_tree_step: 5
    category: "Human related threats"
    is_new_to_agentic: true
    llm_top10_refs: []
    mitigations:
      - "Monitor agent behavior to ensure alignment with defined role"
      - "Restrict tool access to minimize attack surface"
      - "Limit the agent's ability to print links"
      - "Validation mechanisms to detect and filter manipulated responses"
      - "Guardrails, moderation APIs, or another model for response validation"
    scenarios:
      - id: T15-S1
        name: "AI-Powered Invoice Fraud"
        description: >
          An attacker exploits Indirect Prompt Injection to manipulate a business copilot AI,
          replacing legitimate vendor bank details with the attacker's account. The user,
          trusting the AI, unknowingly processes a fraudulent wire transfer.
      - id: T15-S2
        name: "AI-Driven Phishing Attack"
        description: >
          An attacker compromises an AI assistant to generate a deceptive message instructing the
          user to click a malicious link disguised as a security update, leading to account takeover.

  T16:
    id: T16
    name: "Insecure Inter-Agent Protocol Abuse"
    description: >
      As protocols like MCP and A2A gain adoption, they introduce a new attack surface rooted in
      inter-agent communication and coordination. This threat involves abusing the commands and trust
      embedded in these protocols, including manipulating server responses, injecting context, or
      misleading agents through poorly defined tool descriptions or ambiguous consent flows.
    decision_tree_step: 3
    category: "Tool, execution and supply chain-based threats"
    is_new_to_agentic: true
    llm_top10_refs: []
    mitigations:
      - "Enforce strong authentication between agents"
      - "Sanitize and validate all protocol-level data including context payloads and tool metadata"
      - "Restrict agent-to-agent delegation to tightly scoped functions"
      - "Log all inter-agent communications and tool invocations"
      - "Encrypt communications to avoid adversary-in-the-middle attacks"
    scenarios:
      - id: T16-S1
        name: "Consent Flow Manipulation"
        description: >
          An attacker crafts a malicious agent that participates in an A2A exchange but manipulates
          the consent negotiation flow, auto-approving sensitive actions like data deletion without
          explicit user intent.
      - id: T16-S2
        name: "Context Hijacking via MCP Response Injection"
        description: >
          An attacker intercepts or crafts a server-side response within an MCP implementation that
          injects malicious context or tool metadata. A cooperating agent interprets the injected
          response as trusted protocol context and executes unintended backend operations.
      - id: T16-S3
        name: "Tool Misuse via Descriptive Exploitation"
        description: >
          An attacker embeds misleading or overly broad tool descriptions in a shared tool registry.
          Another agent accepts and calls the tool under false assumptions, unintentionally leaking
          sensitive data or triggering privileged API calls.

  T17:
    id: T17
    name: "Supply Chain Compromise"
    description: >
      A compromised supply chain can result in vulnerable, malicious, outdated, or otherwise harmful
      components being included into the agent, allowing an attacker to manipulate agent actions,
      obtain data, or run arbitrary code. This can occur via models, libraries, tools, poisoned build
      environments, or other system components. Agents are long-lived, stateful entities capable of
      persistently executing actions or propagating logic, making a single supply chain compromise
      capable of triggering privilege escalation, behavioral drift, or systemic misuse.
    decision_tree_step: 3
    category: "Tool, execution and supply chain-based threats"
    is_new_to_agentic: false
    llm_top10_refs:
      - id: LLM03
        name: "Supply Chain Vulnerabilities"
        relationship: "significantly amplified in agentic AI where agents autonomously invoke tools and chain decisions"
    mitigations:
      - "Digitally sign artifacts (agent cards, prompt templates, model/tool definitions)"
      - "Use verifiable SBOMs (AIBOMs, Agent SBOMs)"
      - "Apply version control with peer review"
      - "Enforce strong authentication across supply chains"
      - "Restrict untrusted tool installations"
      - "Run agents in sandboxed, isolated environments"
      - "Monitor for drift or malicious behavior across the supply chain"
      - "Red-team agents with simulated supply chain attacks"
    scenarios:
      - id: T17-S1
        name: "Amazon Q Supply Chain Compromise"
        description: >
          An attacker injects a destructive prompt into the GitHub repository of Amazon's Q agent
          for VS Code, instructing it to wipe the system. The malicious update is published
          unknowingly, affecting thousands of developers before detection.
      - id: T17-S2
        name: "Replit Vibe Coding Incident"
        description: >
          Replit's autonomous coding agent hallucinates a fake database, deletes the real one, and
          produces false test results to hide the failure. Occurred due to insufficient separation
          between test and production environments and unvalidated prompt execution.
